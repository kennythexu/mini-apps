                { id:'b039',  date:'2026-03-10', address:'3400 Cahuenga Blvd, Los Angeles, CA',                customerName:'Nadia Okafor',      customer:'Nadia Okafor',     contractor:'Unassigned',        service:'Move Out Clean',     amount:315, lat:34.1021, lng:-118.3395, beds:'5', baths:'4', sqft:'4500', timeStr:'8:00 AM',  lengthSec:21600, contractorIds:'' },

            ];

            return Promise.resolve(bookingsCache);
        };

        // Geo utilities
        const haversine = (lat1, lng1, lat2, lng2) => {
            const R = 3959;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        };

        const detectMarket = (address) => {
            const a = address.toLowerCase();
            if (a.includes('santa monica') || a.includes('venice') || a.includes('brentwood')) return 'LA-West';
            if (a.includes('west hollywood') || a.includes('hollywood') || a.includes('silver lake') || a.includes('echo park')) return 'LA-Central';
            if (a.includes('burbank') || a.includes('glendale') || a.includes('pasadena')) return 'LA-North';
            if (a.includes('studio city') || a.includes('sherman oaks') || a.includes('encino')) return 'LA-Valley';
            if (a.includes('culver city') || a.includes('inglewood') || a.includes('torrance')) return 'LA-South';
            if (a.includes('long beach') || a.includes('el segundo') || a.includes('hawthorne')) return 'LA-SouthBay';
            if (a.includes('los angeles') || a.includes(', ca')) return 'LA';
            return '';
        };

        const detectMarketFromCity = (city) => {
            if (!city) return '';
            const c = city.toLowerCase();
            if (c.includes('santa monica') || c.includes('venice') || c.includes('brentwood')) return 'LA-West';
            if (c.includes('west hollywood') || c.includes('hollywood') || c.includes('silver lake') || c.includes('echo park') || c.includes('los feliz')) return 'LA-Central';
            if (c.includes('burbank') || c.includes('glendale') || c.includes('pasadena')) return 'LA-North';
            if (c.includes('studio city') || c.includes('sherman oaks') || c.includes('encino')) return 'LA-Valley';
            if (c.includes('culver city') || c.includes('inglewood') || c.includes('torrance')) return 'LA-South';
            if (c.includes('long beach') || c.includes('el segundo') || c.includes('hawthorne')) return 'LA-SouthBay';
            return 'LA';
        };

        const extractCity = (address) => {
            if (!address) return '';
            const parts = address.split(',').map(s => s.trim());
            return parts.length >= 2 ? parts[parts.length - 2] : parts[0];
        };

        const timeToMinutes = (t) => {
            if (typeof t === 'number' || !String(t).includes(':')) {
                const n = Number(t);
                return Math.floor(n / 100) * 60 + (n % 100);
            }
            const [h, m] = String(t).split(':').map(Number);
            return (h || 0) * 60 + (m || 0);
        };

        const minutesToTime = (mins) => {
            if (mins === null || mins === undefined) return '';
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            const ampm = h >= 12 ? 'PM' : 'AM';
            const h12 = h > 12 ? h - 12 : (h === 0 ? 12 : h);
            return `${h12}:${m.toString().padStart(2, '0')} ${ampm}`;
        };

        const formatTime = (t) => {
            if (t === null || t === undefined || t === '') return '';
            let h, m;
            if (typeof t === 'number' || !String(t).includes(':')) {
                const n = Number(t);
                h = Math.floor(n / 100);
                m = n % 100;
            } else {
                [h, m] = String(t).split(':').map(Number);
            }
            if (isNaN(h)) return String(t);
            const ampm = h >= 12 ? 'PM' : 'AM';
            const h12 = h > 12 ? h - 12 : (h === 0 ? 12 : h);
            return `${h12}:${(m||0).toString().padStart(2,'0')} ${ampm}`;
        };

        const formatDate = (dateStr) => {
            if (!dateStr) return '';
            const d = new Date(dateStr + 'T12:00:00');
            return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        };

        const extractTimeFromString = (timeStr) => {
            if (!timeStr) return '';
            timeStr = String(timeStr);
            const match = timeStr.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
            if (!match) return '';
            let h = parseInt(match[1]);
            const m = match[2];
            const ampm = match[3].toUpperCase();
            if (ampm === 'PM' && h < 12) h += 12;
            if (ampm === 'AM' && h === 12) h = 0;
            return `${h.toString().padStart(2, '0')}:${m}`;
        };

        const parseBookingTime = (timeStr) => {
            if (!timeStr) return null;
            const match = String(timeStr).match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
            if (!match) return null;
            let h = parseInt(match[1]);
            const m = parseInt(match[2]);
            const ampm = match[3].toUpperCase();
            if (ampm === 'PM' && h < 12) h += 12;
            if (ampm === 'AM' && h === 12) h = 0;
            return h * 60 + m;
        };

        // Scoring engine
        const scoreContractors = (contractors, job) => {
            const jobDate = new Date(job.date + 'T12:00:00');
            const dayName = jobDate.toLocaleDateString('en-US', { weekday: 'long' }).toLowerCase();
            const jobTime = job.time;
            const jobMarket = detectMarket(job.address || '');

            const dayBookings = {};
            if (bookingsCache) {
                bookingsCache.filter(b => b.date === job.date).forEach(b => {
                    const names = (b.contractor || '').split(',').map(n => n.trim().toLowerCase());
                    names.forEach(name => {
                        if (!name || name === 'unassigned') return;
                        if (!dayBookings[name]) dayBookings[name] = [];
                        const startMin = parseBookingTime(b.timeStr);
                        let endMin = null;
                        if (b.endTime) {
                            const ed = new Date(b.endTime);
                            endMin = ed.getHours() * 60 + ed.getMinutes();
                        } else if (b.lengthSec && startMin !== null) {
                            endMin = startMin + Math.round(b.lengthSec / 60);
                        }
                        dayBookings[name].push({
                            customer: b.customer || b.customerName,
                            start: startMin,
                            end: endMin,
                            startStr: b.timeStr,
                            address: b.address,
                            lat: b.lat,
                            lng: b.lng,
                        });
                    });
                });
            }

            const vals = contractors.map(c => c.bookingsL28D).sort((a,b) => a - b);
            const pct = (v) => {
                const idx = vals.indexOf(v);
                return vals.length > 1 ? Math.round((idx / (vals.length - 1)) * 100) : 50;
            };

            const maxNext7D = Math.max(...contractors.map(c => c.bookingsNext7D), 1);

            return contractors.map(c => {
                const signals = [];
                const scores = {};

                const cMarket = detectMarketFromCity(c.city);
                if (jobMarket && cMarket && jobMarket !== cMarket && jobMarket !== 'LA' && cMarket !== 'LA') {
                    return { ...c, totalScore: -1, signals: [{ text: `Wrong market (${cMarket})`, type: 'bad' }], scores: {}, available: false, availWindow: null };
                }

                const existingJobs = dayBookings[c.name.toLowerCase()] || [];

                scores.history = pct(c.bookingsL28D);
                if (c.bookingsL28D >= 15) signals.push({ text: `Experienced — ${c.bookingsL28D} jobs in 28 days`, type: 'good' });
                else if (c.bookingsL28D >= 5) signals.push({ text: `${c.bookingsL28D} jobs in 28 days`, type: 'neutral' });
                else if (c.bookingsL28D > 0) signals.push({ text: `Light history — ${c.bookingsL28D} jobs in 28 days`, type: 'warn' });
                else signals.push({ text: `No recent bookings`, type: 'bad' });

                const jt = jobTime ? timeToMinutes(jobTime) : null;
                const priorJobs = (existingJobs || []).filter(j => j.end !== null && (jt === null || j.end <= jt));
                priorJobs.sort((a, b) => (b.end || 0) - (a.end || 0));
                const lastJob = priorJobs.length > 0 ? priorJobs[0] : null;
                const fromLat = (lastJob && lastJob.lat) ? lastJob.lat : c.lat;
                const fromLng = (lastJob && lastJob.lng) ? lastJob.lng : c.lng;
                const routeFromLabel = (lastJob && lastJob.lat) ? `last job (${lastJob.address ? lastJob.address.split(',')[0] : 'prev job'})` : 'home';

                if (fromLat && fromLng && job.lat && job.lng) {
                    const dist = haversine(fromLat, fromLng, job.lat, job.lng);
                    scores.zone = dist < 5 ? 100 : dist < 10 ? 80 : dist < 20 ? 50 : dist < 30 ? 30 : 10;
                    if (dist < 5) signals.push({ text: `${dist.toFixed(1)} mi from ${routeFromLabel}`, type: 'good' });
                    else if (dist < 15) signals.push({ text: `${dist.toFixed(1)} mi from ${routeFromLabel}`, type: 'neutral' });
                    else signals.push({ text: `Far — ${dist.toFixed(1)} mi from ${routeFromLabel}`, type: 'warn' });
                } else {
                    const jobCity = extractCity(job.address);
                    if (c.city && jobCity && c.city.toLowerCase() === jobCity.toLowerCase()) {
                        scores.zone = 80;
                        signals.push({ text: `Same city (${c.city})`, type: 'good' });
                    } else if (c.city) {
                        scores.zone = 40;
                        signals.push({ text: `Different area (${c.city})`, type: 'warn' });
                    } else {
                        scores.zone = 30;
                        signals.push({ text: `Location unknown`, type: 'neutral' });
                    }
                }

                const loadRatio = c.bookingsNext7D / maxNext7D;
                scores.workload = Math.round((1 - loadRatio) * 100);
                if (c.bookingsNext7D === 0) signals.push({ text: `No jobs this week — fully available`, type: 'good' });
                else if (c.bookingsNext7D <= 3) signals.push({ text: `Light week (${c.bookingsNext7D} jobs)`, type: 'good' });
                else if (c.bookingsNext7D <= 7) signals.push({ text: `${c.bookingsNext7D} jobs this week`, type: 'neutral' });
                else signals.push({ text: `Heavy week — ${c.bookingsNext7D} jobs`, type: 'warn' });

                scores.priority = Math.min(c.priority * 10, 100);
                if (c.priority >= 8) signals.push({ text: `Top-tier contractor`, type: 'good' });

                let available = false;
                let availWindow = null;
                if (c.bk && c.bk.slots) {
                    const slot = c.bk.slots.find(s => s.date && s.date.toLowerCase() === dayName);
                    if (slot) {
                        availWindow = `${formatTime(slot.start)} – ${formatTime(slot.end)}`;
                        available = true;
                        if (jobTime && slot.start !== undefined && slot.end !== undefined) {
                            const jt = timeToMinutes(jobTime);
                            const st = timeToMinutes(slot.start);
                            const et = timeToMinutes(slot.end);
                            const fits = jt >= st && jt < et;
                            if (fits) {
                                signals.push({ text: `BK hours: ${availWindow}`, type: 'good' });
                            } else {
                                signals.push({ text: `BK hours: ${availWindow} — not at requested time`, type: 'warn' });
                                available = false;
                            }
                        } else {
                            signals.push({ text: `BK hours: ${availWindow}`, type: 'good' });
                        }
                    } else {
                        signals.push({ text: `Not available on ${dayName} (BK)`, type: 'bad' });
                    }
                } else {
                    signals.push({ text: `No BK availability data`, type: 'neutral' });
                    available = true;
                }

                if (existingJobs.length > 0) {
                    existingJobs.forEach(j => {
                        const timeRange = (j.start !== null && j.end !== null)
                            ? `${minutesToTime(j.start)} – ${minutesToTime(j.end)}`
                            : j.startStr || 'time unknown';
                        signals.push({ text: `Already booked: ${j.customer} (${timeRange})`, type: 'bad' });
                    });

                    if (jobTime) {
                        const jt = timeToMinutes(jobTime);
                        const jobDurationMin = job.durationMin || 180;
                        const jobEnd = jt + jobDurationMin;
                        const hasConflict = existingJobs.some(j => {
                            if (j.start === null || j.end === null) return true;
                            return jt < j.end && j.start < jobEnd;
                        });
                        if (hasConflict) {
                            signals.push({ text: `Time conflict — job would overlap existing booking`, type: 'bad' });
                            available = false;
                        } else {
                            signals.push({ text: `No time conflict — gaps exist`, type: 'good' });
                        }
                    } else {
                        signals.push({ text: `Has ${existingJobs.length} job(s) this day`, type: 'warn' });
                        available = false;
                    }
                }

                const totalScore = Math.round(
                    scores.history * 0.40 +
                    scores.zone * 0.30 +
                    scores.workload * 0.20 +
                    scores.priority * 0.10
                );

                return { ...c, totalScore, signals, scores, available, availWindow };
            })
            .filter(c => c.totalScore >= 0)
            .sort((a, b) => {
                if (a.available && !b.available) return -1;
                if (!a.available && b.available) return 1;
                return b.totalScore - a.totalScore;
            });
        };

        // ─── Components ───────────────────────────────────────────────

        const Toast = ({ message, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);

            return (
                <motion.div
                    initial={{ opacity: 0, y: 20 }}
                    animate={{ opacity: 1, y: 0 }}
                    exit={{ opacity: 0, y: 20 }}
                    className="fixed bottom-4 right-4 bg-gray-800 dark:bg-gray-700 text-white px-4 py-3 rounded-lg shadow-lg z-50"
                >
                    {message}
                </motion.div>
            );
        };

        const CircularProgress = ({ value, size = 80, strokeWidth = 8 }) => {
            const radius = (size - strokeWidth) / 2;
            const circumference = radius * 2 * Math.PI;
            const offset = circumference - (value / 100) * circumference;
            const color = value >= 80 ? '#10b981' : value >= 60 ? '#3b82f6' : value >= 40 ? '#f59e0b' : '#ef4444';

            return (
                <div className="relative inline-flex items-center justify-center">
                    <svg width={size} height={size} className="transform -rotate-90">
                        <circle cx={size/2} cy={size/2} r={radius} stroke="currentColor" strokeWidth={strokeWidth} fill="none" className="text-gray-200 dark:text-gray-700" />
                        <circle cx={size/2} cy={size/2} r={radius} stroke={color} strokeWidth={strokeWidth} fill="none" strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round" className="progress-ring-circle" />
                    </svg>
                    <div className="absolute inset-0 flex items-center justify-center">
                        <span className="text-2xl font-bold" style={{ color }}>{value}</span>
                    </div>
                </div>
            );
        };

        const Avatar = ({ name, size = 'md' }) => {
            const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
            const colors = ['bg-blue-500','bg-green-500','bg-purple-500','bg-pink-500','bg-indigo-500','bg-red-500','bg-yellow-500','bg-teal-500'];
            const color = colors[name.charCodeAt(0) % colors.length];
            const sizeClasses = { sm: 'w-8 h-8 text-xs', md: 'w-12 h-12 text-sm', lg: 'w-16 h-16 text-lg' };
            return (
                <div className={`${sizeClasses[size]} ${color} rounded-full flex items-center justify-center text-white font-semibold`}>

        const SignalBadge = ({ signal }) => {
            const icons = { good: '✓', warn: '!', bad: '✕', neutral: 'i' };

                warn: 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400',
                bad: 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400',
                neutral: 'bg-gray-100 text-gray-700 dark:bg-gray-800 dark:text-gray-400'
            };
            return (
                <div className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium ${colors[signal.type]}`}>
                    <span className="font-bold">{icons[signal.type]}</span>
                    <span>{signal.text}</span>

        // Contractor Card Component
        const ContractorCard = ({ contractor, rank }) => {

                1: 'border-yellow-400 bg-gradient-to-br from-yellow-50 to-yellow-100 dark:from-yellow-900/20 dark:to-yellow-800/10',

                    className={`rounded-xl p-5 relative ${cardClass} ${unavailableClass} transition-all`}

                            <p className="text-sm text-gray-600 dark:text-gray-400">
                                {contractor.city} • ${contractor.rate}/hr • {contractor.bookingsL28D} jobs/28d
                            </p>
                            {contractor.phone && <p className="text-sm text-gray-500 dark:text-gray-500 mt-1">{contractor.phone}</p>}
                        </div>
                        <CircularProgress value={contractor.totalScore} size={80} strokeWidth={6} />
                    </div>
                    <div className="space-y-2 mb-4">
                        {contractor.signals.map((signal, idx) => <SignalBadge key={idx} signal={signal} />)}

                    <div className="flex gap-2 flex-wrap mb-3">
                        {contractor.phone && (
                            <>
                                <a href={`tel:${contractor.phone}`} className="px-4 py-2 rounded-lg bg-green-500 hover:bg-green-600 text-white text-sm font-medium transition-colors">📞 Call {contractor.firstName}</a>
                                <a href={`sms:${contractor.phone}`} className="px-4 py-2 rounded-lg bg-blue-500 hover:bg-blue-600 text-white text-sm font-medium transition-colors">💬 Text</a>
                            </>
                        )}
                        <button onClick={copyInfo} className="px-4 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 text-sm font-medium transition-colors">📋 Copy</button>
                    </div>
                    <button onClick={() => setDetailsOpen(!detailsOpen)} className="text-sm text-blue-600 dark:text-blue-400 hover:underline font-medium">
                        {detailsOpen ? '▼' : '▸'} Score details
                    </button>
                    <AnimatePresence>
                        {detailsOpen && (
                            <motion.div
                                initial={{ height: 0, opacity: 0 }}
                                animate={{ height: 'auto', opacity: 1 }}
                                exit={{ height: 0, opacity: 0 }}
                                className="overflow-hidden"
                            >
                                <div className="mt-3 pt-3 border-t border-gray-200 dark:border-gray-700 space-y-2">
                                    {[
                                        { label: 'Booking History (40%)', value: contractor.scores.history },
                                        { label: 'Zone Match (30%)',       value: contractor.scores.zone },
                                        { label: 'Workload Balance (20%)', value: contractor.scores.workload },
                                        { label: 'Priority Tier (10%)',    value: contractor.scores.priority },
                                    ].map((item, idx) => (
                                        <div key={idx} className="flex justify-between text-sm">
                                            <span className="text-gray-600 dark:text-gray-400">{item.label}</span>
                                            <span className="font-medium text-gray-900 dark:text-white">{item.value}/100</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-2 text-xs text-gray-400 dark:text-gray-500 font-mono">Record: {contractor.id}</div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </motion.div>
            );
        };

        // Main App
        const App = () => {
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('darkMode') === 'true');
            const [scenario, setScenario] = useState(null);
            const [selectedBooking, setSelectedBooking] = useState(null);
            const [contractors, setContractors] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [scoredContractors, setScoredContractors] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [toast, setToast] = useState(null);
            const [settingsOpen, setSettingsOpen] = useState(false);
            const [bookingFilter, setBookingFilter] = useState('all');
            const [searchQuery, setSearchQuery] = useState('');
            const [altDays, setAltDays] = useState([]);
            const [selectedDay, setSelectedDay] = useState(null);

            const [formDate, setFormDate] = useState('2026-02-25');
            const [formTime, setFormTime] = useState('');
            const [formAddress, setFormAddress] = useState('');
            const [formService, setFormService] = useState('');

            useEffect(() => {
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                localStorage.setItem('darkMode', darkMode);
            }, [darkMode]);

            const showToast = (msg) => setToast(msg);

            const handleRefresh = () => {
                clearCache();
                showToast('Cache cleared — next query will pull fresh data');
                if (selectedBooking) scoreBooking(selectedBooking);
            };

            const loadData = async () => {
                setLoading(true);
                setError(null);
                try {
                    const [c, b] = await Promise.all([loadContractors(), loadBookings()]);
                    setContractors(c);
                    setBookings(b);
                } catch (e) {
                    setError(e.message);
                } finally {
                    setLoading(false);
                }
            };

            const scoreBooking = async (booking) => {
                setLoading(true);
                try {
                    const c = await loadContractors();
                    const jobTime = extractTimeFromString(booking.timeStr);
                    const durationHrs = booking.lengthSec ? Math.ceil(booking.lengthSec / 3600) : 3;

                    const scored = scoreContractors(c, {
                        date: booking.date,
                        time: jobTime,
                        address: booking.address,
                        lat: booking.lat,
                        lng: booking.lng,
                        service: booking.service,
                        durationMin: durationHrs * 60,
                    });

                    const filtered = scored.filter(contractor => {
                        if (!booking.contractor) return true;
                        return !booking.contractor.toLowerCase().includes(contractor.name.toLowerCase());
                    });

                    setScoredContractors(filtered);
                    generateAltDays(c, booking);
                } catch (e) {
                    setError(e.message);
                } finally {
                    setLoading(false);
                }
            };

            const scoreNewBooking = async () => {
                if (!formDate || !formAddress) { showToast('Enter at least a date and address'); return; }
                setLoading(true);
                try {
                    const c = await loadContractors();
                    const scored = scoreContractors(c, {
                        date: formDate,
                        time: formTime,
                        address: formAddress,
                        lat: null,
                        lng: null,
                        service: formService,
                        durationMin: 180
                    });
                    setScoredContractors(scored);
                    generateAltDays(c, { date: formDate, address: formAddress });
                } catch (e) {
                    setError(e.message);
                } finally {
                    setLoading(false);
                }
            };

            const generateAltDays = (contractors, context) => {
                const baseDate = new Date(context.date + 'T12:00:00');
                const days = [];
                for (let i = 1; i <= 7; i++) {
                    const d = new Date(baseDate);
                    d.setDate(baseDate.getDate() + i);
                    const dateStr = d.toISOString().split('T')[0];
                    const scored = scoreContractors(contractors, {
                        date: dateStr, time: '', address: context.address || '', lat: null, lng: null, durationMin: 180
                    });
                    const available = scored.filter(c => c.available);
                    days.push({
                        date: dateStr,
                        dayName: d.toLocaleDateString('en-US', { weekday: 'short' }),
                        dateLabel: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
                        available: available.length,
                        best: available[0] || null
                    });
                }
                setAltDays(days);
            };

            useEffect(() => { if (scenario === 'replace') loadData(); }, [scenario]);
            useEffect(() => { if (selectedBooking) scoreBooking(selectedBooking); }, [selectedBooking]);

            const filteredBookings = useMemo(() => {
                let filtered = bookings;
                if (bookingFilter !== 'all') {
                    const now = new Date();
                    const todayStr = '2026-02-25';
                    const tomorrowStr = '2026-02-26';
                    const weekEndStr = '2026-03-04';
                    if (bookingFilter === 'today') filtered = filtered.filter(b => b.date === todayStr);
                    else if (bookingFilter === 'tomorrow') filtered = filtered.filter(b => b.date === tomorrowStr);
                    else if (bookingFilter === 'week') filtered = filtered.filter(b => b.date >= todayStr && b.date <= weekEndStr);
                }
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    filtered = filtered.filter(b =>
                        (b.customerName || b.customer || '').toLowerCase().includes(q) ||
                        b.address.toLowerCase().includes(q) ||
                        b.contractor.toLowerCase().includes(q)
                    );
                }
                return filtered.slice(0, 50);
            }, [bookings, bookingFilter, searchQuery]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') {
                        if (settingsOpen) setSettingsOpen(false);
                        else if (selectedBooking) setSelectedBooking(null);
                        else if (scenario) setScenario(null);
                    }
                    if (scenario === 'replace' && filteredBookings.length > 0) {
                        const currentIndex = selectedBooking ? filteredBookings.findIndex(b => b.id === selectedBooking.id) : -1;
                        if (e.key === 'ArrowDown') { e.preventDefault(); setSelectedBooking(filteredBookings[Math.min(currentIndex + 1, filteredBookings.length - 1)]); }
                        if (e.key === 'ArrowUp') { e.preventDefault(); setSelectedBooking(filteredBookings[Math.max(currentIndex - 1, 0)]); }
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [scenario, selectedBooking, filteredBookings, settingsOpen]);

            const connected = true;

            return (
                <div className="min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors">
                    {/* DEMO Banner */}
                    <div className="bg-yellow-400 dark:bg-yellow-600 text-black dark:text-gray-900 text-center py-2 px-4 font-semibold text-sm">
                        🎬 DEMO MODE — Los Angeles data · 50 contractors · 40 bookings · no Airtable required
                    </div>

                    {/* Header */}
                    <header className="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-40">

                            <div className="flex items-center justify-between">
                                <div>
                                    <h1 className="text-2xl font-bold text-gray-900 dark:text-white">Dispatch v2</h1>
                                    <p className="text-sm text-gray-500 dark:text-gray-400 mt-0.5">Find the right contractor, fast</p>
                                </div>
                                <div className="flex items-center gap-3">
                                    <div className="flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-medium bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400">
                                        <div className="w-2 h-2 rounded-full bg-green-500"></div>
                                        Demo Data Loaded
                                    </div>
                                    <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
                                        {darkMode ? '☀️' : '🌙'}
                                    </button>
                                    <button onClick={() => setSettingsOpen(!settingsOpen)} className="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">⚙️</button>
                                    <button onClick={handleRefresh} className="px-4 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors text-sm font-medium text-gray-700 dark:text-gray-200">↻ Refresh</button>
                                </div>
                            </div>
                            <AnimatePresence>
                                {settingsOpen && (
                                    <motion.div initial={{ height: 0, opacity: 0 }} animate={{ height: 'auto', opacity: 1 }} exit={{ height: 0, opacity: 0 }} className="mt-4 overflow-hidden">
                                        <div className="bg-gray-50 dark:bg-gray-900 rounded-xl p-4">
                                            <p className="text-sm text-gray-600 dark:text-gray-400">
                                                <strong>Demo Mode</strong> — No credentials needed. Using 50 LA-area contractors and 40 bookings spanning Feb 25 – Mar 10, 2026.
                                            </p>
                                        </div>
                                    </motion.div>
                                )}
                            </AnimatePresence>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
                        {!scenario && (
                            <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6">
                                <h2 className="text-lg font-semibold text-gray-900 dark:text-white mb-4">What's happening?</h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <motion.button whileHover={{ scale: 1.02 }} whileTap={{ scale: 0.98 }} onClick={() => setScenario('replace')} className="p-6 rounded-xl border-2 border-gray-200 dark:border-gray-700 hover:border-blue-500 dark:hover:border-blue-400 bg-white dark:bg-gray-900 transition-all">
                                        <div className="text-4xl mb-3">🔄</div>
                                        <div className="text-lg font-semibold text-gray-900 dark:text-white mb-1">Replace / Reschedule</div>
                                        <div className="text-sm text-gray-500 dark:text-gray-400">Find a replacement for an existing booking</div>
                                    </motion.button>
                                    <motion.button whileHover={{ scale: 1.02 }} whileTap={{ scale: 0.98 }} onClick={() => setScenario('new')} className="p-6 rounded-xl border-2 border-gray-200 dark:border-gray-700 hover:border-blue-500 dark:hover:border-blue-400 bg-white dark:bg-gray-900 transition-all">
                                        <div className="text-4xl mb-3">🟢</div>
                                        <div className="text-lg font-semibold text-gray-900 dark:text-white mb-1">New Booking</div>

                                                    className={`w-full p-3 rounded-lg border text-left transition-all ${selectedBooking?.id === booking.id ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/20' : 'border-gray-200 dark:border-gray-700 hover:border-blue-300 dark:hover:border-blue-700 bg-white dark:bg-gray-900'}`}>

                                </div>

                                <div className="lg:col-span-2">

                                                </div>

                                                <h2 className="text-lg font-semibold text-gray-900 dark:text-white mb-4">Recommendations</h2>
                                                <div className="space-y-4">
                                                    {scoredContractors.slice(0, 10).map((contractor, idx) => (
                                                        <ContractorCard key={contractor.id} contractor={contractor} rank={idx + 1} />
                                                    ))}
                                                </div>
                                            </div>
                                        </motion.div>
                                    )}
                                    {selectedBooking && !scoredContractors.length && !loading && (
                                        <div className="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-12 text-center">
                                            <div className="text-4xl mb-3">🔍</div>
                                            <div className="text-gray-600 dark:text-gray-400">No contractors available for this booking</div>
                                        </div>
                                    )}
                                    {!selectedBooking && (
                                        <div className="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-12 text-center">
                                            <div className="text-4xl mb-3">👈</div>
                                            <div className="text-gray-600 dark:text-gray-400">Select a booking to see recommendations</div>
                                        </div>
                                    )}
                                </div>
                            </div>

                        {scenario === 'new' && !scoredContractors.length && (

                                <h2 className="text-lg font-semibold text-gray-900 dark:text-white mb-4">Job Details</h2>
                                <div className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Date</label>
                                            <input type="date" value={formDate} onChange={(e) => setFormDate(e.target.value)} className="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-white text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Time</label>
                                            <select value={formTime} onChange={(e) => setFormTime(e.target.value)} className="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-white text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                                <option value="">Pick time...</option>
                                                {['08:00','08:30','09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00'].map(t => (
                                                    <option key={t} value={t}>{formatTime(t)}</option>

                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Address</label>
                                        <input type="text" value={formAddress} onChange={(e) => setFormAddress(e.target.value)} placeholder="1542 Sunset Blvd, Los Angeles, CA" className="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-white text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">Service Type</label>
                                        <select value={formService} onChange={(e) => setFormService(e.target.value)} className="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-white text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                            <option value="">Any</option>
                                            <option value="Standard Clean">Standard Clean</option>
                                            <option value="Deep Clean">Deep Clean</option>
                                            <option value="Move Out Clean">Move Out Clean</option>
                                            <option value="Monthly Recurring">Monthly Recurring</option>
                                        </select>
                                    </div>
                                    <button onClick={scoreNewBooking} disabled={loading} className="w-full px-4 py-3 rounded-lg bg-blue-500 hover:bg-blue-600 disabled:bg-gray-300 dark:disabled:bg-gray-700 text-white font-medium transition-colors">
                                        {loading ? 'Finding contractors...' : 'Find Contractors'}
                                    </button>
                                    <button onClick={() => setScenario(null)} className="w-full px-4 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 font-medium transition-colors">← Back</button>
                                </div>
                            </motion.div>
                        )}

                        {scenario === 'new' && scoredContractors.length > 0 && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="space-y-6">
                                {altDays.length > 0 && (
                                    <div className="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6">
                                        <h2 className="text-lg font-semibold text-gray-900 dark:text-white mb-4">Alternative Days</h2>
                                        <div className="flex gap-3 overflow-x-auto pb-2 no-scrollbar">
                                            {altDays.map((day, idx) => (
                                                <motion.button key={day.date} initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} transition={{ delay: idx * 0.05 }}
                                                    onClick={() => { setFormDate(day.date); scoreNewBooking(); }}
                                                    className="flex-shrink-0 p-4 rounded-lg border text-center min-w-[140px] border-gray-200 dark:border-gray-700 hover:border-blue-300 dark:hover:border-blue-700 bg-white dark:bg-gray-900 transition-all">
                                                    <div className="font-semibold text-gray-900 dark:text-white">{day.dayName}</div>
                                                    <div className="text-xs text-gray-500 dark:text-gray-400 mb-2">{day.dateLabel}</div>
                                                    <div className="text-xs text-gray-600 dark:text-gray-300">{day.available} available</div>
                                                    {day.best && <div className="text-sm font-medium text-gray-900 dark:text-white mt-1">{day.best.firstName} ({day.best.totalScore})</div>}
                                                </motion.button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                <div className="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6">
                                    <h2 className="text-lg font-semibold text-gray-900 dark:text-white mb-4">Recommendations</h2>
                                    <div className="space-y-4">
                                        {scoredContractors.slice(0, 10).map((contractor, idx) => (
                                            <ContractorCard key={contractor.id} contractor={contractor} rank={idx + 1} />
                                        ))}
                                    </div>
                                    <button onClick={() => { setScoredContractors([]); setAltDays([]); }} className="w-full mt-6 px-4 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 font-medium transition-colors">← Back</button>
                                </div>
                            </motion.div>
                        )}
                    </main>

                    <AnimatePresence>
                        {toast && <Toast message={toast} onClose={() => setToast(null)} />}
                    </AnimatePresence>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
