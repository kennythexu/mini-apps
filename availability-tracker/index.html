<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Availability Tracker — Rover Cleaners</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e4e4e7; min-height: 100vh; }
        .header { background: #1a1b23; border-bottom: 1px solid #2a2b35; padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .header h1 { font-size: 1.5rem; font-weight: 700; }
        .header h1 span { color: #818cf8; }
        .controls { display: flex; gap: 12px; align-items: center; }
        .controls select, .controls input { background: #2a2b35; border: 1px solid #3a3b45; color: #e4e4e7; padding: 8px 12px; border-radius: 8px; font-size: 0.9rem; }
        .controls button { background: #818cf8; color: #fff; border: none; padding: 8px 20px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; font-weight: 600; }
        .controls button:hover { background: #6366f1; }
        .controls button:disabled { background: #4a4b55; cursor: not-allowed; }

        .summary-bar { display: flex; gap: 16px; padding: 20px 32px; flex-wrap: wrap; }
        .summary-card { background: #1a1b23; border: 1px solid #2a2b35; border-radius: 12px; padding: 16px 24px; flex: 1; min-width: 160px; }
        .summary-card .label { font-size: 0.8rem; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
        .summary-card .value { font-size: 1.8rem; font-weight: 700; }
        .summary-card .value.green { color: #4ade80; }
        .summary-card .value.yellow { color: #facc15; }
        .summary-card .value.red { color: #f87171; }
        .summary-card .value.blue { color: #818cf8; }

        .progress-bar-container { padding: 0 32px 20px; }
        .progress-bar { background: #2a2b35; border-radius: 8px; height: 12px; overflow: hidden; display: flex; }
        .progress-bar .segment { height: 100%; transition: width 0.5s ease; }
        .progress-bar .submitted { background: #4ade80; }
        .progress-bar .pending { background: #facc15; }
        .progress-bar .overdue { background: #f87171; }

        .table-container { padding: 0 32px 32px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #1a1b23; border-radius: 12px; overflow: hidden; }
        thead th { background: #22232d; padding: 12px 16px; text-align: left; font-size: 0.8rem; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
        tbody td { padding: 12px 16px; border-top: 1px solid #2a2b35; font-size: 0.9rem; white-space: nowrap; }
        tbody tr:hover { background: #22232d; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; }
        .badge.submitted { background: rgba(74, 222, 128, 0.15); color: #4ade80; }
        .badge.pending { background: rgba(250, 204, 21, 0.15); color: #facc15; }
        .badge.overdue { background: rgba(248, 113, 113, 0.15); color: #f87171; }
        .badge.not-started { background: rgba(113, 113, 122, 0.15); color: #71717a; }
        .check { color: #4ade80; } .cross { color: #f87171; }

        .auth-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .auth-box { background: #1a1b23; border: 1px solid #2a2b35; border-radius: 16px; padding: 32px; max-width: 420px; width: 90%; text-align: center; }
        .auth-box h2 { margin-bottom: 12px; }
        .auth-box p { color: #71717a; margin-bottom: 20px; font-size: 0.9rem; }
        .auth-box input { width: 100%; background: #2a2b35; border: 1px solid #3a3b45; color: #e4e4e7; padding: 12px 16px; border-radius: 8px; font-size: 1rem; margin-bottom: 16px; }
        .auth-box button { width: 100%; background: #818cf8; color: #fff; border: none; padding: 12px; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: 600; }

        .loading { text-align: center; padding: 60px; color: #71717a; }
        .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #3a3b45; border-top-color: #818cf8; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="auth-overlay" class="auth-overlay" style="display:none;">
    <div class="auth-box">
        <h2>🔑 Airtable Token</h2>
        <p>Enter your Airtable personal access token. It'll be saved in your browser's localStorage.</p>
        <input type="password" id="token-input" placeholder="pat..." />
        <button onclick="saveToken()">Connect</button>
    </div>
</div>

<div class="header">
    <h1>📋 <span>Availability</span> Tracker</h1>
    <div class="controls">
        <select id="month-select" onchange="loadData()"></select>
        <button onclick="loadData()" id="refresh-btn">Refresh</button>
        <button onclick="clearToken()" style="background:#2a2b35;">🔑 Reset Token</button>
    </div>
</div>

<div class="summary-bar" id="summary-bar">
    <div class="summary-card"><div class="label">Total Active</div><div class="value blue" id="total-count">—</div></div>
    <div class="summary-card"><div class="label">Submitted</div><div class="value green" id="submitted-count">—</div></div>
    <div class="summary-card"><div class="label">Pending</div><div class="value yellow" id="pending-count">—</div></div>
    <div class="summary-card"><div class="label">Overdue</div><div class="value red" id="overdue-count">—</div></div>
</div>

<div class="progress-bar-container">
    <div class="progress-bar" id="progress-bar"></div>
</div>

<div class="table-container">
    <div class="loading" id="loading"><span class="spinner"></span> Loading contractors...</div>
    <table id="data-table" style="display:none;">
        <thead>
            <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Market</th>
                <th>BK Updated?</th>
                <th>Reply Received?</th>
                <th>Status</th>
                <th>Last Reminder</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
const AIRTABLE_BASE = 'appGDLBAoLuokBQ0Y';
const AIRTABLE_TABLE = 'tblYoNyn18TiVvF90';
const FIELDS = [
    'Name', 'First Name', 'Phone Number', 'City',
    'BK Availability', 'Availability Snapshot Hash',
    'Availability Status', 'Last Availability Reminder', 'Active'
];

let allContractors = [];

// ── Auth ──
function getToken() { return localStorage.getItem('airtable_token'); }
function saveToken() {
    const token = document.getElementById('token-input').value.trim();
    if (!token) return;
    localStorage.setItem('airtable_token', token);
    document.getElementById('auth-overlay').style.display = 'none';
    loadData();
}
function clearToken() {
    localStorage.removeItem('airtable_token');
    document.getElementById('auth-overlay').style.display = 'flex';
}

// ── Month Selector ──
function populateMonths() {
    const select = document.getElementById('month-select');
    const now = new Date();
    for (let i = -1; i <= 3; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
        const opt = document.createElement('option');
        opt.value = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        opt.textContent = d.toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
        // Default to next month
        if (i === 1) opt.selected = true;
        select.appendChild(opt);
    }
}

// ── MD5 (simple for hash comparison) ──
function md5(str) {
    // We'll compare hashes server-side; for display we just check if hash field is populated
    return str ? 'populated' : '';
}

// ── Airtable Fetch ──
async function fetchContractors(token) {
    let records = [];
    let offset = null;
    const fieldParams = FIELDS.map(f => `fields%5B%5D=${encodeURIComponent(f)}`).join('&');
    const filter = encodeURIComponent('{Active}=TRUE()');

    do {
        let url = `https://api.airtable.com/v0/${AIRTABLE_BASE}/${AIRTABLE_TABLE}?filterByFormula=${filter}&${fieldParams}`;
        if (offset) url += `&offset=${offset}`;

        const resp = await fetch(url, {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (resp.status === 401 || resp.status === 403) {
            clearToken();
            throw new Error('Invalid token');
        }

        const data = await resp.json();
        records = records.concat(data.records || []);
        offset = data.offset;

        if (offset) await new Promise(r => setTimeout(r, 220));
    } while (offset);

    return records;
}

// ── Determine Status ──
function determineStatus(contractor, selectedMonth) {
    const fields = contractor.fields || {};
    const status = fields['Availability Status'];

    if (status === 'Submitted') return 'submitted';
    if (status === 'Overdue') return 'overdue';
    if (status === 'Pending') return 'pending';
    return 'not-started';
}

function hasBKUpdate(contractor) {
    const fields = contractor.fields || {};
    const storedHash = fields['Availability Snapshot Hash'] || '';
    // If hash exists, check if BK Availability has been modified
    // For now, use the Availability Status field as the source of truth
    return fields['Availability Status'] === 'Submitted';
}

// ── Render ──
function render(contractors) {
    const selectedMonth = document.getElementById('month-select').value;
    const now = new Date();
    const currentDay = now.getDate();

    // Count by status
    let submitted = 0, pending = 0, overdue = 0, notStarted = 0;
    const rows = [];

    contractors.forEach(c => {
        const f = c.fields || {};
        const status = determineStatus(c, selectedMonth);
        const name = f['Name'] || '—';
        const phones = f['Phone Number'] || [];
        const phone = Array.isArray(phones) ? phones[0] || '—' : phones || '—';
        const city = f['City'] || '—';
        const bkUpdated = status === 'submitted';
        const replyReceived = status === 'submitted';
        const lastReminder = f['Last Availability Reminder'] || '—';

        if (status === 'submitted') submitted++;
        else if (status === 'overdue') overdue++;
        else if (status === 'pending') pending++;
        else notStarted++;

        rows.push({ name, phone, city, bkUpdated, replyReceived, status, lastReminder });
    });

    // Sort: overdue first, then pending, then not-started, then submitted
    const order = { overdue: 0, pending: 1, 'not-started': 2, submitted: 3 };
    rows.sort((a, b) => (order[a.status] ?? 4) - (order[b.status] ?? 4));

    // Summary
    const total = contractors.length;
    document.getElementById('total-count').textContent = total;
    document.getElementById('submitted-count').textContent = submitted;
    document.getElementById('pending-count').textContent = pending + notStarted;
    document.getElementById('overdue-count').textContent = overdue;

    // Progress bar
    const bar = document.getElementById('progress-bar');
    bar.innerHTML = '';
    if (total > 0) {
        const pctSubmitted = (submitted / total * 100).toFixed(1);
        const pctPending = ((pending + notStarted) / total * 100).toFixed(1);
        const pctOverdue = (overdue / total * 100).toFixed(1);
        if (submitted > 0) bar.innerHTML += `<div class="segment submitted" style="width:${pctSubmitted}%" title="${submitted} submitted"></div>`;
        if (pending + notStarted > 0) bar.innerHTML += `<div class="segment pending" style="width:${pctPending}%" title="${pending + notStarted} pending"></div>`;
        if (overdue > 0) bar.innerHTML += `<div class="segment overdue" style="width:${pctOverdue}%" title="${overdue} overdue"></div>`;
    }

    // Table
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '';

    rows.forEach(r => {
        const tr = document.createElement('tr');
        const statusBadge = `<span class="badge ${r.status}">${r.status === 'not-started' ? 'Not Started' : r.status.charAt(0).toUpperCase() + r.status.slice(1)}</span>`;
        const bkIcon = r.bkUpdated ? '<span class="check">✅</span>' : '<span class="cross">❌</span>';
        const replyIcon = r.replyReceived ? '<span class="check">✅</span>' : '<span class="cross">❌</span>';
        const reminderDate = r.lastReminder !== '—' ? new Date(r.lastReminder + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '—';

        tr.innerHTML = `
            <td><strong>${escHtml(r.name)}</strong></td>
            <td>${escHtml(formatPhone(r.phone))}</td>
            <td>${escHtml(r.city)}</td>
            <td style="text-align:center">${bkIcon}</td>
            <td style="text-align:center">${replyIcon}</td>
            <td>${statusBadge}</td>
            <td>${reminderDate}</td>
        `;
        tbody.appendChild(tr);
    });

    document.getElementById('loading').style.display = 'none';
    document.getElementById('data-table').style.display = '';
}

function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function formatPhone(p) {
    if (!p || p === '—') return '—';
    const digits = String(p).replace(/\D/g, '');
    if (digits.length === 10) return `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`;
    if (digits.length === 11) return `(${digits.slice(1,4)}) ${digits.slice(4,7)}-${digits.slice(7)}`;
    return p;
}

// ── Load ──
async function loadData() {
    const token = getToken();
    if (!token) {
        document.getElementById('auth-overlay').style.display = 'flex';
        return;
    }

    document.getElementById('loading').style.display = '';
    document.getElementById('data-table').style.display = 'none';
    document.getElementById('refresh-btn').disabled = true;

    try {
        allContractors = await fetchContractors(token);
        render(allContractors);
    } catch (err) {
        console.error('Error:', err);
        document.getElementById('loading').innerHTML = `<span style="color:#f87171;">Error loading data: ${escHtml(err.message)}</span>`;
    } finally {
        document.getElementById('refresh-btn').disabled = false;
    }
}

// ── Init ──
populateMonths();
if (getToken()) {
    loadData();
} else {
    document.getElementById('auth-overlay').style.display = 'flex';
    document.getElementById('loading').style.display = 'none';
}
</script>
</body>
</html>
